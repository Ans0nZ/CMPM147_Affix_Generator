<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pokémon Nature Generator (Weighted + Cards)</title>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 18px;
      line-height: 1.25;
    }
    h2 { margin: 0 0 10px 0; }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }
    .field { min-width: 220px; }
    label { display:block; font-size: 12px; opacity: 0.85; margin-bottom: 6px; }
    select, input[type="number"] { padding: 8px 10px; font-size: 14px; width: 100%; }
    input[type="checkbox"] { transform: translateY(1px); }
    .checkline { display:flex; gap:8px; align-items:center; }
    button { padding: 9px 12px; font-size: 14px; cursor: pointer; }
    .hint { font-size: 12px; opacity: 0.75; line-height: 1.4; margin-top: 6px; }

    .panel {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
    }

    /* Cards output */
    .meta {
      font-size: 12px;
      opacity: 0.85;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }
    .card h3 {
      margin: 0 0 6px 0;
      font-size: 16px;
      display:flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }
    .badge {
      font-size: 11px;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 2px 8px;
      opacity: 0.9;
      white-space: nowrap;
    }
    .affix { font-size: 13px; opacity: 0.9; margin-bottom: 8px; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .stats div { display:flex; justify-content: space-between; }
    .footer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* Stats output */
    .statsPanel pre {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .btns { display:flex; gap:10px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h2>Pokémon Nature Generator</h2>

  <div class="row">
    <div class="field">
      <label>Meta Focus (distribution bias)</label>
      <select id="metaFocus">
        <option value="Physical">Physical (+Atk bias)</option>
        <option value="Special">Special (+SpA bias)</option>
        <option value="Speed">Speed (+Spe bias)</option>
        <option value="Bulky">Bulky (+Def/+SpD bias)</option>
        <option value="Neutral">Neutral (no bias)</option>
      </select>
    </div>

    <div class="field">
      <label>Build Tag (synergy constraints)</label>
      <select id="buildTag">
        <option value="Any">Any (no strict build constraint)</option>
        <option value="PhysicalSweeper">Physical Sweeper</option>
        <option value="SpecialSweeper">Special Sweeper</option>
        <option value="Tank">Tank</option>
        <option value="Mixed">Mixed</option>
      </select>
    </div>

    <div class="field">
      <label>Samples to generate</label>
      <input id="sampleCount" type="number" min="10" max="200" value="10" />
    </div>

    <div class="field">
      <label>Options</label>
      <div class="checkline">
        <input id="allowNeutral" type="checkbox" checked />
        <span>Allow Neutral Natures</span>
      </div>
      <div class="checkline" style="margin-top:6px;">
        <input id="strictSynergy" type="checkbox" checked />
        <span>Strict Synergy (Optional B)</span>
      </div>
      <div class="hint">
        Neutral natures are the 5 where up==down (no stat changes).
      </div>
    </div>

    <div class="btns">
      <button id="btnSamples">Generate Samples</button>
      <button id="btnStats">Run 100 Stats</button>
      <button id="btnClear">Clear Output</button>
    </div>
  </div>

  <div class="panel">
    <div id="metaLine" class="meta"></div>
    <div id="cards" class="cards"></div>
  </div>

  <div class="panel statsPanel" style="margin-top:12px;">
    <div class="meta">Distribution Evidence (for rubric):</div>
    <pre id="statsOut"></pre>
    <div class="footer">
      Tip: Run stats under two different Meta Focus settings and compare UP frequency.
    </div>
  </div>

<script>
/** ========= 1) Core Data ========= **/

const STATS = ["Atk", "Def", "SpA", "SpD", "Spe"];

const NAME_MAP = {
  "Atk-SpA": "Adamant",
  "Atk-Spe": "Brave",
  "Atk-Def": "Naughty",
  "Atk-SpD": "Lonely",

  "Def-Atk": "Bold",
  "Def-SpA": "Relaxed",
  "Def-Spe": "Impish",
  "Def-SpD": "Lax",

  "SpA-Atk": "Modest",
  "SpA-Def": "Mild",
  "SpA-Spe": "Quiet",
  "SpA-SpD": "Rash",

  "SpD-Atk": "Calm",
  "SpD-Def": "Gentle",
  "SpD-SpA": "Careful",
  "SpD-Spe": "Sassy",

  "Spe-Atk": "Timid",
  "Spe-Def": "Jolly",
  "Spe-SpA": "Hasty",
  "Spe-SpD": "Naive",

  "Atk-Atk": "Hardy",
  "Def-Def": "Docile",
  "SpA-SpA": "Bashful",
  "SpD-SpD": "Quirky",
  "Spe-Spe": "Serious"
};

function buildMultipliers(up, down) {
  const mult = {};
  for (const s of STATS) mult[s] = 1.0;
  if (up !== down) {
    mult[up] = 1.1;
    mult[down] = 0.9;
  }
  return mult;
}

function buildNaturePool({ allowNeutral=true }) {
  const pool = [];
  for (const up of STATS) {
    for (const down of STATS) {
      const key = `${up}-${down}`;
      const isNeutral = (up === down);
      if (!allowNeutral && isNeutral) continue;
      pool.push({
        up, down, key,
        name: NAME_MAP[key] ?? key,
        isNeutral,
        mult: buildMultipliers(up, down)
      });
    }
  }
  return pool;
}

/** ========= 2) Weighted Picking ========= **/

function weightedPick(items, weightFn) {
  let total = 0;
  const weights = items.map(it => {
    const w = Math.max(0, Number(weightFn(it)) || 0);
    total += w;
    return w;
  });
  if (total <= 0) return null;

  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[items.length - 1];
}

/** ========= 3) Weights + Synergy ========= **/

function metaWeight(nature, metaFocus) {
  let w = 1;
  if (metaFocus === "Neutral") return w;

  switch (metaFocus) {
    case "Physical":
      if (nature.up === "Atk") w *= 3.0;
      if (nature.down === "Atk") w *= 0.2;
      if (nature.up === "SpA") w *= 0.6;
      break;

    case "Special":
      if (nature.up === "SpA") w *= 3.0;
      if (nature.down === "SpA") w *= 0.2;
      if (nature.up === "Atk") w *= 0.6;
      break;

    case "Speed":
      if (nature.up === "Spe") w *= 3.0;
      if (nature.down === "Spe") w *= 0.2;
      break;

    case "Bulky":
      if (nature.up === "Def" || nature.up === "SpD") w *= 2.3;
      if (nature.down === "Def" || nature.down === "SpD") w *= 0.35;
      break;
  }
  return w;
}

function synergyWeight(nature, buildTag, strictSynergy) {
  if (!strictSynergy || buildTag === "Any") return 1;

  if (buildTag === "PhysicalSweeper") {
    if (nature.down === "Atk") return 0;
    if (nature.up === "Atk" || nature.up === "Spe") return 1.8;
    if (nature.up === "SpA") return 0.3;
  }

  if (buildTag === "SpecialSweeper") {
    if (nature.down === "SpA") return 0;
    if (nature.up === "SpA" || nature.up === "Spe") return 1.8;
    if (nature.up === "Atk") return 0.3;
  }

  if (buildTag === "Tank") {
    if (nature.down === "Def" || nature.down === "SpD") return 0;
    if (nature.up === "Def" || nature.up === "SpD") return 2.0;
  }

  if (buildTag === "Mixed") {
    if (nature.down === "Atk" || nature.down === "SpA") return 0.25;
    return 1.1;
  }

  return 1;
}

function combinedWeight(nature, cfg) {
  const w1 = metaWeight(nature, cfg.metaFocus);
  const w2 = synergyWeight(nature, cfg.buildTag, cfg.strictSynergy);
  // Mildly discourage neutral in non-neutral metas
  const w3 = (nature.isNeutral && cfg.metaFocus !== "Neutral") ? 0.7 : 1.0;
  return w1 * w2 * w3;
}

/** ========= 4) Generate ========= **/

function generateNature(cfg) {
  const pool = buildNaturePool({ allowNeutral: cfg.allowNeutral });
  return weightedPick(pool, n => combinedWeight(n, cfg));
}

/** ========= 5) Evidence Stats ========= **/

function runStats(cfg, trials=100) {
  const countsUp = Object.fromEntries(STATS.map(s => [s, 0]));
  const countsDown = Object.fromEntries(STATS.map(s => [s, 0]));
  let neutralCount = 0;

  for (let i = 0; i < trials; i++) {
    const n = generateNature(cfg);
    if (!n) continue;
    if (n.isNeutral) neutralCount++;
    countsUp[n.up] = (countsUp[n.up] || 0) + 1;
    countsDown[n.down] = (countsDown[n.down] || 0) + 1;
  }

  const pct = (x) => (x / trials * 100).toFixed(1) + "%";

  let out = `--- Distribution Stats (${trials} trials) ---\n`;
  out += `metaFocus=${cfg.metaFocus}, buildTag=${cfg.buildTag}, allowNeutral=${cfg.allowNeutral}, strictSynergy=${cfg.strictSynergy}\n`;
  out += `Neutral: ${neutralCount} (${pct(neutralCount)})\n\n`;

  out += `UP frequency:\n`;
  for (const s of STATS) out += `  ${s}: ${countsUp[s]} (${pct(countsUp[s])})\n`;

  out += `\nDOWN frequency:\n`;
  for (const s of STATS) out += `  ${s}: ${countsDown[s]} (${pct(countsDown[s])})\n`;

  return out;
}

/** ========= 6) UI ========= **/

const el = (id) => document.getElementById(id);

function readConfig() {
  return {
    metaFocus: el("metaFocus").value,
    buildTag: el("buildTag").value,
    allowNeutral: el("allowNeutral").checked,
    strictSynergy: el("strictSynergy").checked
  };
}

function setMetaLine(cfg, count) {
  el("metaLine").textContent =
`Samples: ${count}
metaFocus=${cfg.metaFocus} | buildTag=${cfg.buildTag} | allowNeutral=${cfg.allowNeutral} | strictSynergy=${cfg.strictSynergy}`;
}

function statRow(label, value) {
  const div = document.createElement("div");
  const a = document.createElement("span");
  const b = document.createElement("span");
  a.textContent = label;
  b.textContent = value;
  div.appendChild(a);
  div.appendChild(b);
  return div;
}

function renderCard(nature, index) {
  const card = document.createElement("div");
  card.className = "card";

  const title = document.createElement("h3");
  const name = document.createElement("span");
  name.textContent = `${String(index).padStart(2, "0")}. ${nature.name}`;
  const badge = document.createElement("span");
  badge.className = "badge";
  badge.textContent = nature.isNeutral ? "NEUTRAL" : "NATURE";
  title.appendChild(name);
  title.appendChild(badge);

  const affix = document.createElement("div");
  affix.className = "affix";
  affix.textContent = nature.isNeutral ? "No stat changes (neutral nature)." : `Boosts ${nature.up} (+10%), lowers ${nature.down} (-10%).`;

  const stats = document.createElement("div");
  stats.className = "stats";
  for (const s of STATS) {
    stats.appendChild(statRow(s, `×${nature.mult[s].toFixed(1)}`));
  }

  card.appendChild(title);
  card.appendChild(affix);
  card.appendChild(stats);

  return card;
}

function clearCards() {
  el("cards").innerHTML = "";
}

el("btnSamples").addEventListener("click", () => {
  const cfg = readConfig();
  const count = Math.max(10, Math.min(200, Number(el("sampleCount").value) || 10));

  setMetaLine(cfg, count);
  clearCards();

  for (let i = 1; i <= count; i++) {
    const nature = generateNature(cfg);
    el("cards").appendChild(renderCard(nature, i));
  }
});

el("btnStats").addEventListener("click", () => {
  const cfg = readConfig();
  el("statsOut").textContent = runStats(cfg, 100);
});

el("btnClear").addEventListener("click", () => {
  el("metaLine").textContent = "";
  clearCards();
  el("statsOut").textContent = "";
});
</script>
</body>
</html>
